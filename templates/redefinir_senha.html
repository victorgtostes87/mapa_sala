<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ titulo }} - Mapa de Sala</title>
  <script src="{{ url_for('static', filename='js/lucide.min.js') }}"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>
  <div class="card">
    <div class="logo">
      <img class="login-logo-img" src="{{ url_for('static', filename='img/mapa-sala-logo.png') }}" alt="">
      <h1>{{ titulo }}</h1>
      <p>Usuário: {{ usuario }}</p>
    </div>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for msg in messages %}
          <div class="alert">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="/definir-senha/{{ token }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label for="nova_senha">Nova senha</label>
        <input type="password" id="nova_senha" name="nova_senha" minlength="8" autocomplete="new-password" required autofocus>
      </div>
      <div class="form-group">
        <label for="confirmar_senha">Confirmar senha</label>
        <input type="password" id="confirmar_senha" name="confirmar_senha" minlength="8" autocomplete="new-password" required>
      </div>
      <button type="submit" class="btn"><i data-lucide="key-round"></i> Salvar senha</button>
    </form>

    <p class="footer-text"><a href="/login">Voltar para o login</a></p>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
