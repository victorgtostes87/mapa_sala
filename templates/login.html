<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Mapa de Salas</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      padding: 1rem;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }

    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo-icon {
      font-size: 3rem;
      display: block;
      margin-bottom: 0.5rem;
    }

    .logo h1 {
      color: #ffffff;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .logo p {
      color: rgba(255,255,255,0.5);
      font-size: 0.85rem;
      margin-top: 0.3rem;
    }

    .alert {
      background: rgba(255, 80, 80, 0.15);
      border: 1px solid rgba(255, 80, 80, 0.3);
      color: #ff8080;
      border-radius: 10px;
      padding: 0.75rem 1rem;
      font-size: 0.875rem;
      margin-bottom: 1.25rem;
      text-align: center;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      color: rgba(255,255,255,0.7);
      font-size: 0.82rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 0.5rem;
    }

    input {
      width: 100%;
      padding: 0.85rem 1rem;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      color: #ffffff;
      font-size: 1rem;
      transition: all 0.2s;
      outline: none;
    }

    input::placeholder { color: rgba(255,255,255,0.3); }

    input:focus {
      border-color: #4f8ef7;
      background: rgba(79,142,247,0.1);
      box-shadow: 0 0 0 3px rgba(79,142,247,0.15);
    }

    .btn {
      width: 100%;
      padding: 0.95rem;
      background: linear-gradient(135deg, #4f8ef7, #7c3aed);
      border: none;
      border-radius: 12px;
      color: #ffffff;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0.5rem;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 25px rgba(79,142,247,0.4);
    }

    .btn:active { transform: translateY(0); }

    .footer-text {
      text-align: center;
      color: rgba(255,255,255,0.3);
      font-size: 0.78rem;
      margin-top: 1.75rem;
    }

    @media (max-width: 480px) {
      .card { padding: 2rem 1.5rem; border-radius: 16px; }
      .logo h1 { font-size: 1.2rem; }
    }
  </style>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="card">
    <div class="logo">
      <span class="logo-icon">🏥</span>
      <h1>Mapa de Salas</h1>
      <p>Policlínica de Psicologia</p>
    </div>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for msg in messages %}
          <div class="alert">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="/login">
      <div class="form-group">
        <label for="username">Usuário</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Digite seu usuário"
          autocomplete="username"
          required
          autofocus
        >
      </div>
      <div class="form-group">
        <label for="password">Senha</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Digite sua senha"
          autocomplete="current-password"
          required
        >
      </div>
      <button type="submit" class="btn">🔒 Entrar</button>
    </form>

    <p class="footer-text">Acesso restrito &mdash; apenas usuários autorizados</p>
  </div>
<script>lucide.createIcons();</script>
</body>
</html>
