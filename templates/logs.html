<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logs do Sistema</title>
<script src="{{ url_for('static', filename='js/lucide.min.js') }}"></script>
<link rel="stylesheet" href="{{ url_for('static', filename='css/logs.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/nav.css') }}">
</head>
<body>
<nav class="app-nav">
  <a class="app-nav-brand" href="/"><i data-lucide="layout-grid"></i><span>Mapa de Sala - <span>Policlínica Psicologia UVV</span></span></a>
  <div class="app-nav-title">Logs do Sistema</div>
  <div class="app-nav-spacer"></div>
  <div class="app-nav-user">
    <span class="app-nav-user-name"><i data-lucide="user-round"></i> {{ usuario }}</span>
    <span class="role-badge role-{{ papel }}">{{ (papeis_label|default({})).get(papel, papel) }}</span>
  </div>
  <div class="app-nav-actions">
    <a href="/painel" class="app-btn app-btn-ghost"><i data-lucide="arrow-left"></i> Voltar</a>
    <a href="/perfil" class="app-btn app-btn-ghost"><i data-lucide="user-round"></i> Perfil</a>
    <a href="/logout" class="app-btn app-btn-danger"><i data-lucide="log-out"></i> Sair</a>
  </div>
</nav>

<div class="container">
  <div class="filters">
    <input type="text" id="busca" placeholder="Filtrar por usuario, acao ou dados..." oninput="filtrar()">
    <select id="filtroAcao" onchange="filtrar()">
      <option value="">Todas as acoes</option>
      <option>LOGIN</option><option>LOGOUT</option>
      <option>CRIAR</option><option>EDITAR</option><option>EXCLUIR</option>
      <option>CRIAR_USUARIO</option><option>EDITAR_USUARIO</option><option>EXCLUIR_USUARIO</option>
      <option>EXPORTAR</option>
    </select>
    <a href="/api/backup" class="btn-secondary">Backup</a>
    <button type="button" class="btn-danger" id="btnApagarLogs">Apagar logs dos ultimos 15 dias</button>
  </div>

  <table>
    <thead><tr><th>Data/Hora</th><th>Usuario</th><th>Acao</th><th>IP</th><th>Navegador</th><th>Detalhes</th></tr></thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="empty" id="empty" style="display:none">Nenhum log encontrado.</div>

  <div class="pag-bar" id="pagBar" style="display:none">
    <div class="pag-info" id="pagInfo"></div>
    <div style="display:flex;align-items:center;gap:12px">
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font-size:12px;color:var(--text2)">Linhas por pagina:</span>
        <select class="pag-size" id="pagSize" onchange="mudarTamanho()">
          <option value="25">25</option>
          <option value="50" selected>50</option>
          <option value="100">100</option>
          <option value="200">200</option>
        </select>
      </div>
      <div class="pag-controls" id="pagControls"></div>
    </div>
  </div>
</div>

<script>
let todos    = [];
let filtrado = [];
let pagAtual = 1;

const CORES = {
  CRIAR:'acao-criar', EDITAR:'acao-editar', EXCLUIR:'acao-excluir',
  LOGIN:'acao-login', LOGOUT:'acao-logout', EXPORTAR:'acao-exportar',
  CRIAR_USUARIO:'acao-criar', EDITAR_USUARIO:'acao-editar',
  EXCLUIR_USUARIO:'acao-excluir', INATIVAR_USUARIO:'acao-excluir'
};

function formatTs(ts){
  if(!ts) return '-';
  return ts.replace('T',' ').substring(0,16).replace('-','/').replace('-','/');
}

function classeAcao(a){ return CORES[a] || 'acao-outro'; }

function esc(t){
  return String(t || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function porPagina(){ return parseInt(document.getElementById('pagSize').value) || 50; }

function totalPags(){ return Math.max(1, Math.ceil(filtrado.length / porPagina())); }

function render(){
  const tbody  = document.getElementById('tbody');
  const empty  = document.getElementById('empty');
  const pagBar = document.getElementById('pagBar');

  if(!filtrado.length){
    tbody.innerHTML = '';
    empty.style.display = 'block';
    pagBar.style.display = 'none';
    return;
  }

  empty.style.display = 'none';
  pagBar.style.display = 'flex';

  const pp    = porPagina();
  const total = totalPags();
  pagAtual    = Math.min(pagAtual, total);

  const inicio = (pagAtual - 1) * pp;
  const fatia  = filtrado.slice(inicio, inicio + pp);

  tbody.innerHTML = fatia.map(r=>`
    <tr>
      <td class="ts">${formatTs(r.ts)}</td>
      <td>${esc(r.usuario)||'-'}</td>
      <td><span class="badge-acao ${classeAcao(r.acao)}">${esc(r.acao)}</span></td>
      <td class="ts">${esc(r.ip)||'-'}</td>
      <td class="user-agent">${esc(r.user_agent)||'-'}</td>
      <td class="dados">${esc(r.dados)}</td>
    </tr>
  `).join('');

  const de  = inicio + 1;
  const ate = Math.min(inicio + pp, filtrado.length);
  document.getElementById('pagInfo').innerHTML =
    `Mostrando <strong>${de}-${ate}</strong> de <strong>${filtrado.length}</strong> registros`;

  renderControles(total);
}

function renderControles(total){
  const ctrl = document.getElementById('pagControls');
  if(total <= 1){ ctrl.innerHTML = ''; return; }

  const MAX_BTNS = 5;
  let inicio = Math.max(1, pagAtual - Math.floor(MAX_BTNS / 2));
  let fim    = Math.min(total, inicio + MAX_BTNS - 1);
  if(fim - inicio < MAX_BTNS - 1) inicio = Math.max(1, fim - MAX_BTNS + 1);

  let html = `<button class="pag-btn" onclick="irPara(${pagAtual-1})" ${pagAtual===1?'disabled':''}>&#8592;</button>`;

  if(inicio > 1){
    html += `<button class="pag-btn" onclick="irPara(1)">1</button>`;
    if(inicio > 2) html += `<span class="pag-sep">...</span>`;
  }

  for(let i = inicio; i <= fim; i++){
    html += `<button class="pag-btn ${i===pagAtual?'active':''}" onclick="irPara(${i})">${i}</button>`;
  }

  if(fim < total){
    if(fim < total - 1) html += `<span class="pag-sep">...</span>`;
    html += `<button class="pag-btn" onclick="irPara(${total})">${total}</button>`;
  }

  html += `<button class="pag-btn" onclick="irPara(${pagAtual+1})" ${pagAtual===total?'disabled':''}>&#8594;</button>`;
  ctrl.innerHTML = html;
}

function irPara(pag){
  const total = totalPags();
  if(pag < 1 || pag > total) return;
  pagAtual = pag;
  render();
  document.querySelector('.container').scrollIntoView({behavior:'smooth', block:'start'});
}

function mudarTamanho(){
  pagAtual = 1;
  render();
}

function filtrar(){
  const busca = document.getElementById('busca').value.toLowerCase();
  const acao  = document.getElementById('filtroAcao').value;
  filtrado = todos.filter(r=>{
    const ok_acao  = !acao  || r.acao === acao;
    const ok_busca = !busca || (r.usuario||'').toLowerCase().includes(busca)
                            || (r.acao||'').toLowerCase().includes(busca)
                            || (r.dados||'').toLowerCase().includes(busca);
    return ok_acao && ok_busca;
  });
  pagAtual = 1;
  render();
}

async function carregar(){
  try {
    const res = await fetch('/api/logs');
    const data = await res.json();
    if (!res.ok) throw new Error(data.erro || 'Nao foi possivel carregar os logs.');
    todos = data.logs || [];
    filtrado = todos;
    render();
  } catch (err) {
    todos = [];
    filtrado = [];
    render();
    document.getElementById('empty').textContent = err.message || 'Falha ao carregar os logs. Tente novamente.';
  }
}

async function apagarLogsRecentes(){
  if(!confirm('Apagar os logs dos ultimos 15 dias? Esta acao nao pode ser desfeita.')) return;

  try {
    const res = await fetch('/api/admin/apagar-logs-recentes', {
      method: 'POST',
      headers: {'X-CSRFToken': {{ csrf_token() | tojson }}}
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.erro || 'Nao foi possivel apagar os logs.');
    alert(data.message || 'Logs apagados com sucesso.');
    carregar();
  } catch (err) {
    alert(err.message || 'Falha ao apagar os logs. Tente novamente.');
  }
}

document.getElementById('btnApagarLogs').addEventListener('click', apagarLogsRecentes);
carregar();
</script>
<script>lucide.createIcons();</script>
<div style="margin:18px 0;text-align:center;color:#6b7280;font-size:12px">Versao {{ versao }}</div>
</body>
</html>
