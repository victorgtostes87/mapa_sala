<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — Mapa de Salas</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    body { display:flex; align-items:center; justify-content:center; padding:20px; }
    .login-wrap { width:100%; max-width:380px; }
    .login-wrap h1 { font-size:20px; font-weight:700; color:#f8fafc; text-align:center; margin-bottom:8px; }
    .login-wrap .subtitle { text-align:center; color:var(--muted); font-size:12px; margin-bottom:24px; }
    .btn-login { width:100%; justify-content:center; padding:9px; font-size:13px; margin-top:4px; }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="card">
    <h1>🏥 Mapa de Salas</h1>
    <p class="subtitle">Policlínica — Psicologia</p>
    {% with msgs = get_flashed_messages() %}
      {% if msgs %}{% for m in msgs %}<div class="alert alert-error" style="margin-bottom:14px">{{ m }}</div>{% endfor %}{% endif %}
    {% endwith %}
    <form method="post" autocomplete="off">
      <div class="form-group">
        <label>Usuário</label>
        <input class="form-control" name="username" autofocus required placeholder="nome de login">
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input class="form-control" type="password" name="password" required placeholder="••••••">
      </div>
      <button class="btn btn-login" type="submit">Entrar</button>
    </form>
  </div>
</div>
</body>
</html>
