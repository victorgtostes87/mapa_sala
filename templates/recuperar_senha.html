<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar senha - Mapa de Sala</title>
  <script src="{{ url_for('static', filename='js/lucide.min.js') }}"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>
  <div class="card">
    <div class="logo">
      <img class="login-logo-img" src="{{ url_for('static', filename='img/mapa-sala-logo.png') }}" alt="">
      <h1>Recuperar senha</h1>
      <p>Informe seu usuário ou e-mail cadastrado.</p>
    </div>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for msg in messages %}
          <div class="alert">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="/recuperar-senha">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label for="identificador">Usuário ou e-mail</label>
        <input type="text" id="identificador" name="identificador" placeholder="Digite seu usuário ou e-mail" required autofocus>
      </div>
      <button type="submit" class="btn"><i data-lucide="mail"></i> Enviar link</button>
    </form>

    <p class="footer-text"><a href="/login">Voltar para o login</a></p>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
