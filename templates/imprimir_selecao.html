{% extends "base.html" %}
{% block title %}Imprimir — Mapa de Salas{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">🖨 Imprimir lista de pacientes</h1>
</div>
<div class="card" style="max-width:460px">
  <p style="color:var(--muted);margin-bottom:20px;font-size:12px">
    Selecione o dia da semana para gerar a lista de pacientes para a portaria.
  </p>
  <div style="display:flex;flex-direction:column;gap:8px">
    {% for dia in dias %}
    <a href="{{ url_for('imprimir', dia=dia) }}" class="btn btn-secondary" style="justify-content:flex-start">
      📋 {{ dias_pt[dia] }}
    </a>
    {% endfor %}
  </div>
</div>
{% endblock %}
