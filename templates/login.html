<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Mapa de Salas</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="auth-page">
  <div class="card">
    <div class="logo">
      <span class="logo-icon">🏥</span>
      <h1>Mapa de Salas</h1>
      <p>Policlínica de Psicologia</p>
    </div>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for msg in messages %}
          <div class="alert">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="/login">
      <div class="form-group">
        <label for="username">Usuário</label>
        <input type="text" id="username" name="username" placeholder="Digite seu usuário" autocomplete="username" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" name="password" placeholder="Digite sua senha" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn">🔒 Entrar</button>
    </form>

    <p class="footer-text">Acesso restrito &mdash; apenas usuários autorizados</p>
  </div>
<script>lucide.createIcons();</script>
</body>
</html>
