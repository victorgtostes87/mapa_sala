<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trocar Senha</title>
  
<link rel="stylesheet" href="{{ url_for('static', filename='css/trocar_senha.css') }}">
</head>
<body>
  <div class="container">
    <h1>Trocar Senha</h1>
    <div class="sub">Olá, {{ usuario }}</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for cat, msg in messages %}
          <div class="flash {{ cat }}">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('trocar_senha') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label for="senha_atual">Senha atual</label>
      <input type="password" id="senha_atual" name="senha_atual" required>

      <label for="nova_senha">Nova senha</label>
      <input type="password" id="nova_senha" name="nova_senha" minlength="8" required>
      <div class="hint">Mínimo 8 caracteres.</div>

      <label for="confirmar_senha">Confirmar nova senha</label>
      <input type="password" id="confirmar_senha" name="confirmar_senha" minlength="8" required>

      <div class="actions">
        <button type="submit" class="btn btn-primary">Salvar nova senha</button>
        <a href="{{ url_for('index') }}" class="btn btn-secondary">Voltar ao mapa</a>
      </div>
    </form>
  </div>
<div style="margin:18px 0;text-align:center;color:#6b7280;font-size:12px">Versão {{ versao }}</div>
</body>
</html>
