{% extends "base.html" %}
{% block title %}Trocar Senha — Mapa de Salas{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">🔒 Trocar Senha</h1>
</div>
<div class="card" style="max-width:420px">
  <form method="post">
    <div class="form-group">
      <label>Senha atual</label>
      <input class="form-control" type="password" name="senha_atual" required autofocus>
    </div>
    <div class="form-group">
      <label>Nova senha <span style="color:var(--muted);font-weight:400;text-transform:none">(mín. 6 caracteres)</span></label>
      <input class="form-control" type="password" name="nova_senha" required minlength="6">
    </div>
    <div class="form-group">
      <label>Confirmar nova senha</label>
      <input class="form-control" type="password" name="confirmar_senha" required minlength="6">
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn" type="submit">Alterar</button>
      <a href="{{ url_for('perfil') }}" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
