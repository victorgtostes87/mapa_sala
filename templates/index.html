<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa de Salas – Policlínica</title>
<style>
:root{--bg:#0f172a;--surface:#1e293b;--surface2:#263348;--border:#334155;--text:#e2e8f0;--text2:#94a3b8;--accent:#3b82f6;--accent2:#2563eb;--radius:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;min-height:100vh}
.navbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.navbar h1{font-size:16px;font-weight:700;color:#f8fafc;white-space:nowrap}.navbar h1 span{color:var(--accent)}
.navbar-spacer{flex:1}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius);border:none;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-danger{background:#dc2626;color:#fff}.btn-danger:hover{background:#b91c1c}
/* Abas dias */
.tabs{display:flex;gap:0;padding:0 20px;background:var(--surface);border-bottom:1px solid var(--border)}
.tab{padding:10px 20px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
/* Stats */
.stats-bar{display:flex;gap:10px;padding:10px 20px;flex-wrap:wrap}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:8px 16px;min-width:120px}
.stat-card .label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.stat-card .value{font-size:22px;font-weight:700;color:#f8fafc;margin-top:1px}
/* Filters */
.filters{display:flex;gap:8px;padding:0 20px 10px;flex-wrap:wrap;align-items:center}
.filters input,.filters select{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:6px 10px;font-size:12px;outline:none}
.filters input:focus,.filters select:focus{border-color:var(--accent)}
.filters input{min-width:200px}
/* Grid */
.page-body{position:fixed;top:160px;left:0;right:0;bottom:48px;overflow:hidden}
.grid-wrap{position:absolute;inset:0;overflow:scroll;padding-bottom:8px}
.mapa-table{border-collapse:separate;border-spacing:0;width:max-content;min-width:100%}
.mapa-table th{background:var(--surface);color:var(--text2);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;padding:7px 8px;border:1px solid var(--border);position:sticky;top:0;z-index:10;white-space:nowrap;text-align:center}
.mapa-table th:first-child{left:0;z-index:20;min-width:64px}
.mapa-table td{border:1px solid var(--border);vertical-align:top;padding:0;min-width:148px;max-width:165px;position:relative}
.mapa-table td:first-child{background:var(--surface);color:var(--text2);font-size:12px;font-weight:700;text-align:center;padding:6px;position:sticky;left:0;z-index:5;min-width:64px;white-space:nowrap}
.cell{padding:5px 7px;min-height:52px;cursor:pointer;transition:opacity .15s;display:flex;flex-direction:column;gap:2px}
.cell:hover{opacity:.8}.cell:hover .edit-btn{display:inline-flex}
.intern{font-size:11px;font-weight:600;line-height:1.3;word-break:break-word}
.patient{font-size:11px;color:rgba(255,255,255,.75);line-height:1.3;word-break:break-word;border-top:1px solid rgba(255,255,255,.15);padding-top:2px;margin-top:2px}
.edit-btn{display:none;position:absolute;top:3px;right:3px;background:rgba(0,0,0,.4);border:none;color:#fff;border-radius:4px;padding:2px 5px;font-size:10px;cursor:pointer}
.badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;background:rgba(0,0,0,.25);color:rgba(255,255,255,.85);text-transform:uppercase;letter-spacing:.3px;margin-top:2px}
/* Category colors */
.cat-est10{background:#1d4ed8}.cat-est10t{background:#1e40af}.cat-est9{background:#15803d}.cat-est9t{background:#166534}
.cat-sup{background:#6d28d9}.cat-nace{background:#c2410c}.cat-sou{background:#0e7490}
.cat-marcar{background:#4d7c0f}.cat-nmarcar{background:#991b1b}.cat-nutri{background:#65a30d}
.cat-psico{background:#374151}.cat-psiq{background:#1e3a5f}.cat-ambul{background:#78350f}
.cat-plantao{background:#9d174d}.cat-pront{background:#92400e}.cat-livre{background:#1e293b}.cat-outro{background:#334155}
/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:500px;max-width:95vw;max-height:90vh;overflow-y:auto;padding:24px}
.modal h2{font-size:16px;font-weight:700;margin-bottom:18px;color:#f8fafc}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.form-row input,.form-row select,.form-row textarea{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:8px 12px;font-size:13px;outline:none}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--accent)}
.form-row textarea{resize:vertical;min-height:60px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}
/* Legend */
.legend{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:7px 20px;display:flex;flex-wrap:wrap;gap:8px;z-index:50}
.leg-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text2)}
.leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
/* Toast */
.toast{position:fixed;top:20px;right:20px;padding:10px 18px;border-radius:var(--radius);font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}.toast.success{background:#16a34a;color:#fff}.toast.error{background:#dc2626;color:#fff}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>
<!-- Navbar -->
<nav class="navbar">
  <h1>🏥 Mapa de <span>Salas</span></h1>
  <div class="navbar-spacer"></div>
  <label class="btn btn-ghost btn-sm" for="csvInput">📂 Importar CSV</label>
  <input type="file" id="csvInput" accept=".csv" style="display:none" onchange="importCSV(this)">
  <button class="btn btn-ghost btn-sm" onclick="exportCSV()">⬇️ Exportar</button>
  <button class="btn btn-primary btn-sm" onclick="openModal(null)">＋ Novo</button>
</nav>

<!-- Abas por dia -->
<div class="tabs" id="dayTabs">
  {% for d in dias %}
  <div class="tab {% if loop.first %}active{% endif %}" onclick="selectDay('{{d}}',this)">{{d}}</div>
  {% endfor %}
</div>

<!-- Stats -->
<div class="stats-bar">
  <div class="stat-card"><div class="label">Total</div><div class="value" id="stTotal">—</div></div>
  <div class="stat-card"><div class="label">Livres</div><div class="value" id="stLivre">—</div></div>
  <div class="stat-card"><div class="label">Estagiários</div><div class="value" id="stEst">—</div></div>
</div>

<!-- Filters -->
<div class="filters">
  <input type="text" id="searchInput" placeholder="🔍  Buscar paciente, estagiário..." oninput="debounceRender()">
  <select id="filterHorario" onchange="renderGrid()"><option value="">Todos horários</option>
    {% for h in horarios %}<option>{{h}}</option>{% endfor %}</select>
  <select id="filterSala" onchange="renderGrid()"><option value="">Todas salas</option>
    {% for s in salas %}<option>{{s}}</option>{% endfor %}</select>
  <select id="filterCat" onchange="renderGrid()"><option value="">Todas categorias</option>
    {% for c in categorias %}<option>{{c}}</option>{% endfor %}</select>
  <button class="btn btn-ghost btn-sm" onclick="clearFilters()">✕ Limpar</button>
</div>

<!-- Grid -->
<div class="page-body"><div class="grid-wrap" id="gridWrap">
  <table class="mapa-table"><thead id="tableHead"></thead><tbody id="tableBody"></tbody></table>
</div>
</div>

<!-- Legend -->
<div class="legend">
  <div class="leg-item"><div class="leg-dot" style="background:#1d4ed8"></div>Estag. 10°</div>
  <div class="leg-item"><div class="leg-dot" style="background:#1e40af"></div>10° Triagem</div>
  <div class="leg-item"><div class="leg-dot" style="background:#15803d"></div>Estag. 9°</div>
  <div class="leg-item"><div class="leg-dot" style="background:#166534"></div>9° Triagem</div>
  <div class="leg-item"><div class="leg-dot" style="background:#6d28d9"></div>Supervisão</div>
  <div class="leg-item"><div class="leg-dot" style="background:#c2410c"></div>NACE</div>
  <div class="leg-item"><div class="leg-dot" style="background:#0e7490"></div>SOU</div>
  <div class="leg-item"><div class="leg-dot" style="background:#4d7c0f"></div>Marcar</div>
  <div class="leg-item"><div class="leg-dot" style="background:#991b1b"></div>Não Marcar</div>
  <div class="leg-item"><div class="leg-dot" style="background:#374151"></div>Psicodiagnóstico</div>
  <div class="leg-item"><div class="leg-dot" style="background:#6d28d9"></div>Psiquiatria</div>
  <div class="leg-item"><div class="leg-dot" style="background:#78350f"></div>Amb. Neurop.</div>
  <div class="leg-item"><div class="leg-dot" style="background:#9d174d"></div>Plantão</div>
  <div class="leg-item"><div class="leg-dot" style="background:#92400e"></div>Prontuário</div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalIfBg(event)">
  <div class="modal">
    <h2 id="modalTitle">Agendamento</h2>
    <input type="hidden" id="fId">
    <div class="form-grid">
      <div class="form-row"><label>Dia *</label>
        <select id="fDia">{% for d in dias %}<option>{{d}}</option>{% endfor %}</select></div>
      <div class="form-row"><label>Horário *</label>
        <select id="fHorario">{% for h in horarios %}<option>{{h}}</option>{% endfor %}</select></div>
    </div>
    <div class="form-row"><label>Sala *</label>
      <select id="fSala">{% for s in salas %}<option>{{s}}</option>{% endfor %}</select></div>
    <div class="form-row"><label>Estagiário / Conteúdo</label>
      <input type="text" id="fEstagiario" placeholder="Ex: Ana Carolina 9° (Rodrigo)"></div>
    <div class="form-row"><label>Paciente</label>
      <input type="text" id="fPaciente" placeholder="Nome do paciente"></div>
    <div class="form-grid">
      <div class="form-row"><label>Categoria</label>
        <select id="fCategoria"><option value="">Auto-detectar</option>
          {% for c in categorias %}<option>{{c}}</option>{% endfor %}</select></div>
      <div class="form-row"><label>Triagem?</label>
        <select id="fTriagem"><option value="0">Não</option><option value="1">Sim</option></select></div>
    </div>
    <div class="form-row"><label>Data específica</label>
      <input type="text" id="fData" placeholder="Ex: 12/03, 19/03"></div>
    <div class="form-row"><label>Observação</label>
      <textarea id="fObs" placeholder="Notas adicionais..."></textarea></div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" id="deleteBtn" onclick="deleteAg()" style="display:none;margin-right:auto">🗑 Remover</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveAg()">💾 Salvar</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const SALAS   = {{ salas | tojson }};
const HORARIOS= {{ horarios | tojson }};
const DIAS    = {{ dias | tojson }};
let currentDay = DIAS[0];
let debTimer = null;

const CAT_CLASS = {
  'ESTAGIÁRIO 10°':'cat-est10','ESTAGIÁRIO 10° TRIAGEM':'cat-est10t',
  'ESTAGIÁRIO 9°':'cat-est9','ESTAGIÁRIO 9° TRIAGEM':'cat-est9t',
  'SUPERVISÃO':'cat-sup','NACE':'cat-nace','SOU':'cat-sou',
  'MARCAR':'cat-marcar','NÃO MARCAR':'cat-nmarcar',
  'NUTRIÇÃO':'cat-nutri','PSICODIAGNÓSTICO':'cat-psico',
  'PSIQUIATRIA':'cat-psiq','AMBULATÓRIO NEUROPSICOLOGIA':'cat-ambul',
  'PLANTÃO PSICOLÓGICO':'cat-plantao','PRONTUÁRIO/ESTUDAR':'cat-pront',
  'LIVRE':'cat-livre','OUTRO':'cat-outro'
};

function selectDay(dia, el) {
  currentDay = dia;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderGrid();
}

async function loadData() {
  const horario = document.getElementById('filterHorario').value;
  const sala    = document.getElementById('filterSala').value;
  const cat     = document.getElementById('filterCat').value;
  const busca   = document.getElementById('searchInput').value.trim();
  const p = new URLSearchParams({dia_semana: currentDay});
  if (horario) p.set('horario', horario);
  if (sala)    p.set('sala', sala);
  if (cat)     p.set('categoria', cat);
  if (busca)   p.set('busca', busca);
  const res = await fetch('/api/agendamentos?' + p);
  return await res.json();
}

async function loadStats() {
  const res = await fetch('/api/stats?dia_semana='+currentDay);
  const d = await res.json();
  document.getElementById('stTotal').textContent = d.total;
  document.getElementById('stLivre').textContent = d.livre;
  const est = (d.por_categoria||[]).filter(c=>c.categoria&&c.categoria.startsWith('ESTAGIÁRIO')).reduce((a,c)=>a+c.n,0);
  document.getElementById('stEst').textContent = est;
}

async function renderGrid() {
  const data = await loadData();
  const filterSala = document.getElementById('filterSala').value;
  const filterHor  = document.getElementById('filterHorario').value;
  const salas = filterSala ? [filterSala] : SALAS;
  const hors  = filterHor  ? [filterHor]  : HORARIOS;
  const lk = {};
  for (const ag of data) lk[ag.horario+'|'+ag.sala] = ag;

  document.getElementById('tableHead').innerHTML =
    '<tr><th>Hora</th>' + salas.map(s=>'<th>'+s+'</th>').join('') + '</tr>';

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  for (const h of hors) {
    const tr = document.createElement('tr');
    tr.innerHTML = '<td>'+h+'</td>';
    for (const s of salas) {
      const ag = lk[h+'|'+s];
      const td = document.createElement('td');
      if (ag) {
        const cls = CAT_CLASS[ag.categoria] || 'cat-outro';
        const badgeHtml = ag.triagem ? '<span class="badge">triagem</span>' : '';
        const dataHtml  = ag.data_especifica ? '<span class="badge">'+ag.data_especifica+'</span>' : '';
        td.innerHTML = `<div class="cell ${cls}" onclick="openModal(${ag.id})">
          <button class="edit-btn" onclick="event.stopPropagation();openModal(${ag.id})">✏️</button>
          <div class="intern">${esc(ag.estagiario)}</div>
          ${ag.paciente ? '<div class="patient">'+esc(ag.paciente)+'</div>' : ''}
          <div style="display:flex;gap:3px;flex-wrap:wrap">${badgeHtml}${dataHtml}</div>
        </div>`;
      } else {
        td.innerHTML = `<div class="cell cat-livre" onclick="openModalNew('${h}','${s}')">
          <span style="color:#475569;font-size:10px">livre</span>
        </div>`;
      }
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }
  loadStats();
}

function esc(t){ if(!t)return''; return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function debounceRender(){ clearTimeout(debTimer); debTimer=setTimeout(renderGrid,300); }
function clearFilters(){ document.getElementById('searchInput').value=''; document.getElementById('filterHorario').value=''; document.getElementById('filterSala').value=''; document.getElementById('filterCat').value=''; renderGrid(); }

function openModal(id) {
  document.getElementById('fId').value = id||'';
  document.getElementById('deleteBtn').style.display = id ? 'inline-flex' : 'none';
  document.getElementById('modalTitle').textContent = id ? 'Editar Agendamento' : 'Novo Agendamento';
  if (id) {
    fetch('/api/agendamentos/'+id).then(r=>r.json()).then(d=>{
      setF('fDia',d.dia_semana); setF('fHorario',d.horario); setF('fSala',d.sala);
      document.getElementById('fEstagiario').value=d.estagiario||'';
      document.getElementById('fPaciente').value=d.paciente||'';
      setF('fCategoria',d.categoria); setF('fTriagem',d.triagem);
      document.getElementById('fData').value=d.data_especifica||'';
      document.getElementById('fObs').value=d.observacao||'';
    });
  } else {
    setF('fDia',currentDay); setF('fCategoria',''); setF('fTriagem',0);
    document.getElementById('fEstagiario').value=''; document.getElementById('fPaciente').value='';
    document.getElementById('fData').value=''; document.getElementById('fObs').value='';
  }
  document.getElementById('modalOverlay').classList.add('open');
}
function openModalNew(h,s){ openModal(null); setF('fHorario',h); setF('fSala',s); }
function setF(id,val){ const el=document.getElementById(id); if(el) el.value=val; }
function closeModal(){ document.getElementById('modalOverlay').classList.remove('open'); }
function closeModalIfBg(e){ if(e.target.id==='modalOverlay') closeModal(); }

async function saveAg() {
  const id = document.getElementById('fId').value;
  const body = {
    dia_semana: document.getElementById('fDia').value,
    horario: document.getElementById('fHorario').value,
    sala: document.getElementById('fSala').value,
    estagiario: document.getElementById('fEstagiario').value.trim(),
    paciente: document.getElementById('fPaciente').value.trim(),
    categoria: document.getElementById('fCategoria').value,
    triagem: parseInt(document.getElementById('fTriagem').value)||0,
    data_especifica: document.getElementById('fData').value.trim(),
    observacao: document.getElementById('fObs').value.trim()
  };
  const res = await fetch(id ? '/api/agendamentos/'+id : '/api/agendamentos',
    {method: id?'PUT':'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
  if (res.ok){ showToast('✅ Salvo!','success'); closeModal(); renderGrid(); }
  else showToast('❌ Erro ao salvar','error');
}

async function deleteAg() {
  const id = document.getElementById('fId').value;
  if (!id || !confirm('Remover este agendamento?')) return;
  const res = await fetch('/api/agendamentos/'+id,{method:'DELETE'});
  if (res.ok){ showToast('🗑 Removido','success'); closeModal(); renderGrid(); }
}

async function importCSV(input) {
  const file = input.files[0]; if(!file) return;
  const text = await file.text();
  const res = await fetch('/api/import',{method:'POST',headers:{'Content-Type':'text/plain'},body:text});
  const d = await res.json();
  if (res.ok){ showToast('✅ '+d.message,'success'); renderGrid(); }
  else showToast('❌ '+(d.erro||'Erro'),'error');
  input.value='';
}
function exportCSV(){ window.location='/api/export'; }

function showToast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show '+type;
  setTimeout(()=>t.className='toast',3000);
}

renderGrid();
</script>
</body>
</html>
