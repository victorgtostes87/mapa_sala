<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Mapa de Salas</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px">
    <div class="card" style="width:100%;max-width:380px">
      <div class="logo">
        <h1>🏥 Mapa de Salas</h1>
        <p>Policlínica Escola UNAERP</p>
      </div>
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          {% for msg in messages %}<div class="alert">{{ msg }}</div>{% endfor %}
        {% endif %}
      {% endwith %}
      <form method="POST">
        <div class="form-group">
          <label>Usuário</label>
          <input name="username" type="text" autofocus required>
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input name="password" type="password" required>
        </div>
        <button class="btn btn-primary" type="submit" style="width:100%">Entrar</button>
      </form>
      <p class="footer-text">Sistema de agendamento interno</p>
    </div>
  </div>
</body>
</html>
