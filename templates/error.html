<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ status }} - {{ titulo }}</title>
  
<link rel="stylesheet" href="{{ url_for('static', filename='css/error.css') }}">
<script src="{{ url_for('static', filename='js/voltar.js') }}"></script>
</head>
<body>
  <main>
    <div class="status">Erro {{ status }}</div>
    <h1>{{ titulo }}</h1>
    <p>{{ mensagem }}</p>
    <a href="/" onclick="voltarAbaAnterior(event, '/')">Voltar</a>
    <footer>Versão {{ versao }}</footer>
  </main>
</body>
</html>
